name: CI — Tests, Benchmarks, and Quality Gates

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Native Tests and Linting ──────────────────────────────────────────────
  native-tests:
    runs-on: ubuntu-latest
    name: Native Tests + Clippy + Fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path native/Cargo.toml -- --check

      - name: Clippy lint
        run: cargo clippy --manifest-path native/Cargo.toml -- -D warnings

      - name: Run native tests (including golden snapshots)
        run: cargo test --manifest-path native/Cargo.toml

  # ── Native Benchmarks (regression detection) ──────────────────────────────
  native-benchmarks:
    runs-on: ubuntu-latest
    name: Native Benchmark Gates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run writer benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo bench --manifest-path native/Cargo.toml --bench writer_bench 2>&1 | tee /tmp/writer_bench.txt

      - name: Run text cache benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo bench --manifest-path native/Cargo.toml --bench text_cache_bench 2>&1 | tee /tmp/cache_bench.txt

      - name: Run substrate benchmarks
        shell: bash
        run: |
          set -euo pipefail
          cargo bench --manifest-path native/Cargo.toml --bench text_substrate_bench 2>&1 | tee /tmp/substrate_bench.txt

      - name: Validate substrate benchmark thresholds
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          pattern = re.compile(
              r'^(substrate_[A-Za-z0-9_]+)\s+time:\s+\[[^\]]*?\s([0-9.]+)\s(ns|µs|ms|s)\s[^\]]*\]$'
          )
          thresholds_us = {
              # These thresholds are intentionally generous relative to the
              # checked-in snapshot so they catch real regressions without
              # turning routine CI variance into a flaky gate.
              "substrate_append_1024": 1_000.0,
              "substrate_append_8192": 1_000.0,
              "substrate_append_65536": 5_000.0,
              "substrate_append_262144": 15_000.0,
              "substrate_set_cursor_1024": 1_000.0,
              "substrate_set_cursor_8192": 1_000.0,
              "substrate_set_cursor_65536": 5_000.0,
              "substrate_set_cursor_262144": 12_000.0,
              "substrate_byte_to_visual_1024": 1_000.0,
              "substrate_byte_to_visual_8192": 1_500.0,
              "substrate_byte_to_visual_65536": 6_000.0,
              "substrate_byte_to_visual_262144": 15_000.0,
          }

          found = {}
          for raw_line in Path("/tmp/substrate_bench.txt").read_text().splitlines():
              match = pattern.match(raw_line.strip())
              if not match:
                  continue
              name, value, unit = match.groups()
              scale = {
                  "ns": 0.001,
                  "µs": 1.0,
                  "ms": 1_000.0,
                  "s": 1_000_000.0,
              }[unit]
              median_us = float(value) * scale
              found[name] = median_us

          missing = sorted(set(thresholds_us) - set(found))
          failures = []
          for name, threshold_us in thresholds_us.items():
              if name in found and found[name] > threshold_us:
                  failures.append(f"{name}: median {found[name]:.2f}µs > threshold {threshold_us:.2f}µs")

          if missing or failures:
              if missing:
                  print("Missing substrate benchmark results:")
                  for name in missing:
                      print(f"  - {name}")
              if failures:
                  print("Substrate benchmark threshold failures:")
                  for failure in failures:
                      print(f"  - {failure}")
              raise SystemExit(1)

          print("Substrate benchmark thresholds passed.")
          PY

      - name: Report benchmark results
        if: always()
        run: |
          echo "=== Writer Benchmark Results ==="
          grep -E "^writer_" /tmp/writer_bench.txt || true
          echo ""
          echo "=== Text Cache Benchmark Results ==="
          grep -E "^cache_" /tmp/cache_bench.txt || true
          echo ""
          echo "=== Text Substrate Benchmark Results ==="
          grep -E "^substrate_" /tmp/substrate_bench.txt || true

  # ── Host Layer Tests ──────────────────────────────────────────────────────
  host-tests:
    runs-on: ubuntu-latest
    name: Host Tests + Bundle Budget
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      - name: Install TS dependencies
        run: bun install --cwd ts

      - name: Build native library
        run: cargo build --manifest-path native/Cargo.toml --release

      - name: Run FFI integration tests
        run: bun test ts/test-ffi.test.ts

      - name: Run JSX reconciler tests
        run: bun test ts/test-jsx.test.ts

      - name: Run example replay tests
        run: bun test ts/test-examples.test.ts

      - name: Run install smoke tests
        run: bun test ts/test-install.test.ts

      - name: Run runner API tests
        run: bun test ts/test-runner.test.ts

      - name: Check bundle budget (< 75KB)
        run: bun run ts/check-bundle.ts

  # ── Host Benchmarks ──────────────────────────────────────────────────────
  host-benchmarks:
    runs-on: ubuntu-latest
    name: Host Benchmark Gates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      - name: Install TS dependencies
        run: bun install --cwd ts

      - name: Build native library
        run: cargo build --manifest-path native/Cargo.toml --release

      - name: Run FFI benchmarks
        run: bun run ts/bench-ffi.ts

      - name: Run render benchmarks
        run: bun run ts/bench-render.ts

  # ── Quality Gate Summary ─────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    needs: [native-tests, native-benchmarks, host-tests, host-benchmarks]
    steps:
      - name: All gates passed
        run: echo "All v4 quality gates passed."
